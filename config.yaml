# ============================================================
# Experiment Configuration — Static DP-SGD + MIA Evaluation
# ============================================================

# ---- Training ----
training:
  device: "cuda:0"
  dataset: "CIFAR10"            # CIFAR10 | SVHN | MNIST | CelebA
  batch_size: 256              
  lr: 0.001     
  target_epochs: 100    
  num_workers: 8
  use_aug: false
  weight_decay: 0.0
  train_subset_size: 50000

# ---- Differential Privacy ----
dp:
  use_dp: true
  target_epsilon: 8.0          # privacy budget ε
  delta: 1.0e-5                # Privacy parameter δ
  max_grad_norm: 1.2
  max_physical_batch_size: 256

# ---- XGBoost Attack Model ----
attack:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.05

# ---- Paths ----
paths:
  data_root: "/home/syc/experiments/data"
  celebA_path: "/home/syc/experiments/data/celeba"
  log_base: "./logs"
  checkpoint_dir: "./checkpoints"
  figures_dir: "./figures"